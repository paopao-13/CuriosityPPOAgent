# MiniGrid DoorKey 课程学习 Phase 1：固定布局预热
# 目标: 在单一固定布局上学会"捡钥匙→开门→到终点"的通用解法
# 之后 Phase 2 (minigrid_curriculum_p2_random.yaml) 在随机布局上泛化到 success≈0.95
# 标准基准: MiniGrid-DoorKey-8x8-v0 (文献常用尺寸, 非 16x16)
ppo:
  lr: 1.0e-4
  clip_range: 0.1
  ppo_epochs: 4
  gamma_ext: 0.999
  gamma_int: 0.99
  gae_lambda: 0.95
  ent_coef: 0.02            # 提高以延缓熵塌缩(避免卡在"只捡钥匙")
  vf_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 128
  accumulation_steps: 4
  n_steps: 256
  n_envs: 8
  ext_adv_coef: 4.0         # 外部优势主导(修复等权合并淹没外部信号)
  int_adv_coef: 1.0

rnd:
  enabled: true
  output_dim: 512
  predictor_hidden: 512
  obs_normalize: true
  reward_normalize: true

icm:
  enabled: true
  feature_dim: 288
  eta: 0.2
  hidden_dim: 256

episodic:
  enabled: true
  k: 5
  epsilon: 1.0e-3
  L: 5
  capacity: 10000

env:
  name: minigrid_doorkey
  n_envs: 8
  total_steps: 500000
  reward_shaping: true
  env_id: MiniGrid-DoorKey-8x8-v0
  fixed_layout_seed: 0      # 固定布局(课程 phase1)

ablation: full
use_amp: true
seed: 42
wandb_project: curiosity-ppo
