# MiniGrid DoorKey 消融: 去掉 ICM
# 退化行为: ICM 前向好奇心归零; Episodic embedding 回退为 RND target 输出
ppo:
  lr: 1.0e-4
  clip_range: 0.1
  ppo_epochs: 4
  gamma_ext: 0.999
  gamma_int: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 128
  accumulation_steps: 4
  n_steps: 256
  n_envs: 8

rnd:
  enabled: true
  output_dim: 512
  predictor_hidden: 512
  obs_normalize: true
  reward_normalize: true

icm:
  enabled: false
  feature_dim: 288
  eta: 0.2
  hidden_dim: 256

episodic:
  enabled: true
  k: 5
  epsilon: 1.0e-3
  L: 5
  capacity: 10000

env:
  name: minigrid_doorkey
  n_envs: 8
  total_steps: 1500000

ablation: no_icm
use_amp: true
seed: 42
wandb_project: curiosity-ppo
