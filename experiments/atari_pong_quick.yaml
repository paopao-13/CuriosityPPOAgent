# Atari Pong 轻量配置 (免费 GPU: Kaggle/Colab T4 适用)
# 目标: 用最小成本验证 "ICM 好奇心模块 vs 纯 PPO" 的探索收益
# Pong 稀疏奖励弱、1M 步内即可出分, 免费 T4 约 1-2 小时跑完
ppo:
  lr: 2.5e-4
  clip_range: 0.1
  ppo_epochs: 4
  gamma_ext: 0.99
  gamma_int: 0.99
  gae_lambda: 0.95
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 256
  accumulation_steps: 1
  n_steps: 128
  n_envs: 8

rnd:
  enabled: true
  output_dim: 512
  predictor_hidden: 512
  obs_normalize: true
  reward_normalize: true

icm:
  enabled: true
  feature_dim: 256
  eta: 0.2
  hidden_dim: 256

episodic:
  enabled: true
  k: 5
  epsilon: 1.0e-3
  L: 5
  capacity: 10000

env:
  name: atari_pong
  n_envs: 8
  total_steps: 1000000

ablation: full
use_amp: false
seed: 42
wandb_project: curiosity-ppo
